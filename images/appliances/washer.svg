<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <linearGradient id="wbody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8d0da"/>
      <stop offset="35%" stop-color="#edf0f4"/>
      <stop offset="100%" stop-color="#a8b0bc"/>
    </linearGradient>
    <radialGradient id="drum" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9aaabb"/>
      <stop offset="60%" stop-color="#6a7a8a"/>
      <stop offset="100%" stop-color="#4a5a6a"/>
    </radialGradient>
    <radialGradient id="drumGlass" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="rgba(200,230,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(80,120,160,0.1)"/>
    </radialGradient>
    <filter id="ws"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="rgba(0,0,0,0.2)"/></filter>
  </defs>
  <ellipse cx="100" cy="215" rx="62" ry="5" fill="rgba(0,0,0,0.12)"/>
  <!-- Body -->
  <rect x="25" y="15" width="150" height="195" rx="12" fill="url(#wbody)" filter="url(#ws)"/>
  <!-- Top panel -->
  <rect x="25" y="15" width="150" height="40" rx="12" fill="#dde2e8"/>
  <rect x="25" y="40" width="150" height="15" fill="#dde2e8"/>
  <!-- Control panel -->
  <circle cx="60" cy="33" r="12" fill="#b0b8c4" stroke="#909aa8" stroke-width="1.5"/>
  <circle cx="60" cy="33" r="8" fill="#c8d0dc"/>
  <rect x="90" y="24" width="70" height="18" rx="4" fill="rgba(60,80,100,0.15)"/>
  <rect x="95" y="28" width="18" height="3" rx="1.5" fill="rgba(80,100,120,0.4)"/>
  <rect x="95" y="33" width="24" height="3" rx="1.5" fill="rgba(80,100,120,0.3)"/>
  <!-- Door ring -->
  <circle cx="100" cy="120" r="68" fill="rgba(0,0,0,0.08)"/>
  <circle cx="100" cy="120" r="65" fill="#8898a8"/>
  <circle cx="100" cy="120" r="60" fill="url(#drum)"/>
  <circle cx="100" cy="120" r="58" fill="url(#drumGlass)"/>
  <!-- Drum holes -->
  <circle cx="80" cy="100" r="4" fill="rgba(0,0,0,0.3)"/>
  <circle cx="100" cy="95" r="4" fill="rgba(0,0,0,0.3)"/>
  <circle cx="120" cy="100" r="4" fill="rgba(0,0,0,0.3)"/>
  <circle cx="125" cy="120" r="4" fill="rgba(0,0,0,0.3)"/>
  <circle cx="120" cy="140" r="4" fill="rgba(0,0,0,0.3)"/>
  <circle cx="100" cy="145" r="4" fill="rgba(0,0,0,0.3)"/>
  <circle cx="80" cy="140" r="4" fill="rgba(0,0,0,0.3)"/>
  <circle cx="75" cy="120" r="4" fill="rgba(0,0,0,0.3)"/>
  <!-- Glass shine -->
  <ellipse cx="88" cy="108" rx="18" ry="12" fill="rgba(255,255,255,0.15)" transform="rotate(-20,88,108)"/>
  <!-- Door handle -->
  <rect x="130" y="112" width="12" height="16" rx="6" fill="#b0b8c4"/>
  <!-- Highlight -->
  <rect x="30" y="20" width="7" height="185" rx="3.5" fill="rgba(255,255,255,0.2)"/>
</svg>