<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230" width="200" height="230">
  <defs>
    <linearGradient id="ovbody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c0c8d4"/>
      <stop offset="40%" stop-color="#e8ecf2"/>
      <stop offset="100%" stop-color="#a0aab8"/>
    </linearGradient>
    <radialGradient id="ovglass" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(180,200,220,0.4)"/>
      <stop offset="100%" stop-color="rgba(60,80,100,0.2)"/>
    </radialGradient>
    <linearGradient id="ovheat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,120,30,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,60,0,0.05)"/>
    </linearGradient>
    <filter id="ovs"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="rgba(0,0,0,0.2)"/></filter>
  </defs>
  <ellipse cx="100" cy="226" rx="62" ry="5" fill="rgba(0,0,0,0.12)"/>
  <!-- Body -->
  <rect x="22" y="15" width="156" height="208" rx="10" fill="url(#ovbody)" filter="url(#ovs)"/>
  <!-- Top control strip -->
  <rect x="22" y="15" width="156" height="38" rx="10" fill="#d8e0e8"/>
  <rect x="22" y="40" width="156" height="13" fill="#d8e0e8"/>
  <!-- Knobs -->
  <circle cx="50" cy="32" r="12" fill="#b8c0cc" stroke="#98a0ac" stroke-width="1.5"/>
  <circle cx="50" cy="32" r="7" fill="#ccd4dc"/>
  <line x1="50" y1="22" x2="50" y2="27" stroke="#606870" stroke-width="2" stroke-linecap="round"/>
  <circle cx="84" cy="32" r="10" fill="#b8c0cc" stroke="#98a0ac" stroke-width="1.5"/>
  <circle cx="84" cy="32" r="6" fill="#ccd4dc"/>
  <circle cx="116" cy="32" r="10" fill="#b8c0cc" stroke="#98a0ac" stroke-width="1.5"/>
  <circle cx="116" cy="32" r="6" fill="#ccd4dc"/>
  <circle cx="150" cy="32" r="12" fill="#F54E08" stroke="#d04000" stroke-width="1.5"/>
  <circle cx="150" cy="32" r="7" fill="#ff6a2a"/>
  <!-- Door window -->
  <rect x="30" y="60" width="140" height="100" rx="6" fill="rgba(0,0,0,0.25)"/>
  <rect x="34" y="64" width="132" height="92" rx="4" fill="url(#ovglass)"/>
  <rect x="34" y="64" width="132" height="92" rx="4" fill="url(#ovheat)"/>
  <!-- Glass reflections -->
  <rect x="38" y="68" width="12" height="84" rx="6" fill="rgba(255,255,255,0.12)"/>
  <line x1="60" y1="66" x2="58" y2="154" stroke="rgba(255,255,255,0.07)" stroke-width="8"/>
  <!-- Interior glow -->
  <ellipse cx="100" cy="108" rx="44" ry="30" fill="rgba(255,130,40,0.12)"/>
  <!-- Door handle -->
  <rect x="38" y="170" width="124" height="12" rx="6" fill="#a8b0bc"/>
  <rect x="44" y="172" width="112" height="8" rx="4" fill="#b8c0cc"/>
  <!-- Bottom drawer -->
  <rect x="30" y="188" width="140" height="28" rx="5" fill="rgba(0,0,0,0.08)"/>
  <rect x="60" y="196" width="80" height="8" rx="4" fill="#a8b0bc"/>
  <!-- Highlight -->
  <rect x="27" y="20" width="7" height="195" rx="3.5" fill="rgba(255,255,255,0.2)"/>
</svg>