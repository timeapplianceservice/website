<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 160" width="220" height="160">
  <defs>
    <linearGradient id="ctbody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8ecf2"/>
      <stop offset="100%" stop-color="#c0c8d4"/>
    </linearGradient>
    <radialGradient id="ctburn" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="45%" stop-color="#444"/>
      <stop offset="100%" stop-color="#222"/>
    </radialGradient>
    <radialGradient id="ctflame" cx="50%" cy="65%" r="50%">
      <stop offset="0%" stop-color="#ffeb3b" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#ff9800" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="rgba(244,67,54,0)" />
    </radialGradient>
    <filter id="cts"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(0,0,0,0.2)"/></filter>
  </defs>
  <ellipse cx="110" cy="158" rx="75" ry="5" fill="rgba(0,0,0,0.1)"/>
  <!-- Body -->
  <rect x="15" y="15" width="190" height="136" rx="12" fill="url(#ctbody)" filter="url(#cts)"/>
  <!-- Surface -->
  <rect x="22" y="22" width="176" height="122" rx="8" fill="#dde2e8"/>
  <!-- Grates - 4 burner positions -->
  <rect x="28" y="28" width="74" height="52" rx="5" fill="rgba(0,0,0,0.1)"/>
  <rect x="118" y="28" width="74" height="52" rx="5" fill="rgba(0,0,0,0.1)"/>
  <rect x="28" y="88" width="74" height="44" rx="5" fill="rgba(0,0,0,0.1)"/>
  <rect x="118" y="88" width="74" height="44" rx="5" fill="rgba(0,0,0,0.1)"/>
  <!-- Burner 1 (top-left, with flame) -->
  <circle cx="65" cy="54" r="22" fill="url(#ctburn)"/>
  <circle cx="65" cy="54" r="9" fill="#111"/>
  <ellipse cx="65" cy="47" rx="9" ry="12" fill="url(#ctflame)" opacity="0.9"/>
  <!-- Burner 2 (top-right) -->
  <circle cx="155" cy="54" r="22" fill="url(#ctburn)"/>
  <circle cx="155" cy="54" r="9" fill="#111"/>
  <!-- Burner 3 (bottom-left) -->
  <circle cx="65" cy="110" r="18" fill="url(#ctburn)"/>
  <circle cx="65" cy="110" r="7" fill="#111"/>
  <!-- Burner 4 (bottom-right, oval / power) -->
  <ellipse cx="155" cy="110" rx="26" ry="16" fill="url(#ctburn)"/>
  <circle cx="155" cy="110" r="7" fill="#111"/>
  <!-- Controls strip front -->
  <rect x="22" y="134" width="176" height="0" rx="0"/>
  <!-- Knobs front edge hint -->
  <circle cx="50" cy="142" r="7" fill="#b0b8c4"/>
  <circle cx="80" cy="142" r="7" fill="#b0b8c4"/>
  <circle cx="140" cy="142" r="7" fill="#b0b8c4"/>
  <circle cx="170" cy="142" r="7" fill="#F54E08"/>
  <!-- Highlight -->
  <rect x="20" y="20" width="6" height="116" rx="3" fill="rgba(255,255,255,0.25)"/>
</svg>