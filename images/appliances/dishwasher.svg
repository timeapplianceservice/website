<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230" width="200" height="230">
  <defs>
    <linearGradient id="dwbody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8d0da"/>
      <stop offset="40%" stop-color="#edf0f4"/>
      <stop offset="100%" stop-color="#a8b2be"/>
    </linearGradient>
    <linearGradient id="dwpanel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8ecf0"/>
      <stop offset="100%" stop-color="#d0d8e0"/>
    </linearGradient>
    <filter id="dws"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="rgba(0,0,0,0.2)"/></filter>
  </defs>
  <ellipse cx="100" cy="226" rx="62" ry="5" fill="rgba(0,0,0,0.12)"/>
  <!-- Body -->
  <rect x="28" y="18" width="144" height="202" rx="8" fill="url(#dwbody)" filter="url(#dws)"/>
  <!-- Control panel top -->
  <rect x="28" y="18" width="144" height="28" rx="8" fill="url(#dwpanel)"/>
  <rect x="28" y="34" width="144" height="12" fill="url(#dwpanel)"/>
  <!-- Control dots -->
  <circle cx="55" cy="31" r="5" fill="#F54E08" opacity="0.9"/>
  <circle cx="75" cy="31" r="4" fill="#b0b8c4"/>
  <circle cx="93" cy="31" r="4" fill="#b0b8c4"/>
  <rect x="108" y="25" width="50" height="12" rx="3" fill="rgba(0,0,0,0.08)"/>
  <!-- Door area -->
  <rect x="32" y="50" width="136" height="164" rx="5" fill="rgba(200,210,225,0.25)" stroke="rgba(180,195,215,0.4)" stroke-width="1"/>
  <!-- Handle -->
  <rect x="60" y="52" width="80" height="10" rx="5" fill="#a0a8b4"/>
  <rect x="64" y="54" width="72" height="6" rx="3" fill="#b8c0cc"/>
  <!-- Interior visible through door top -->
  <rect x="36" y="66" width="128" height="20" rx="3" fill="rgba(160,180,200,0.2)"/>
  <!-- Rack lines -->
  <line x1="50" y1="70" x2="50" y2="86" stroke="rgba(140,160,180,0.4)" stroke-width="1.5"/>
  <line x1="64" y1="70" x2="64" y2="86" stroke="rgba(140,160,180,0.4)" stroke-width="1.5"/>
  <line x1="78" y1="70" x2="78" y2="86" stroke="rgba(140,160,180,0.4)" stroke-width="1.5"/>
  <line x1="92" y1="70" x2="92" y2="86" stroke="rgba(140,160,180,0.4)" stroke-width="1.5"/>
  <line x1="106" y1="70" x2="106" y2="86" stroke="rgba(140,160,180,0.4)" stroke-width="1.5"/>
  <line x1="120" y1="70" x2="120" y2="86" stroke="rgba(140,160,180,0.4)" stroke-width="1.5"/>
  <line x1="134" y1="70" x2="134" y2="86" stroke="rgba(140,160,180,0.4)" stroke-width="1.5"/>
  <line x1="148" y1="70" x2="148" y2="86" stroke="rgba(140,160,180,0.4)" stroke-width="1.5"/>
  <!-- Spray arm visible -->
  <ellipse cx="100" cy="160" rx="45" ry="5" fill="none" stroke="rgba(140,160,180,0.35)" stroke-width="2"/>
  <circle cx="100" cy="160" r="6" fill="rgba(130,150,170,0.4)"/>
  <circle cx="100" cy="115" r="36" fill="rgba(130,150,170,0.08)" stroke="rgba(140,160,180,0.2)" stroke-width="1.5"/>
  <!-- Plates suggestion -->
  <ellipse cx="80" cy="130" rx="14" ry="18" fill="none" stroke="rgba(200,215,230,0.5)" stroke-width="2"/>
  <ellipse cx="100" cy="130" rx="14" ry="18" fill="none" stroke="rgba(200,215,230,0.5)" stroke-width="2"/>
  <ellipse cx="120" cy="130" rx="14" ry="18" fill="none" stroke="rgba(200,215,230,0.5)" stroke-width="2"/>
  <!-- Highlight -->
  <rect x="33" y="22" width="7" height="190" rx="3.5" fill="rgba(255,255,255,0.22)"/>
</svg>