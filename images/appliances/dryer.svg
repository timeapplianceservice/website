<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <linearGradient id="dbody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d0d8e0"/>
      <stop offset="35%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#b0b8c4"/>
    </linearGradient>
    <radialGradient id="ddrum" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8d8e8"/>
      <stop offset="70%" stop-color="#8898a8"/>
      <stop offset="100%" stop-color="#5a6a7a"/>
    </radialGradient>
    <radialGradient id="dsheen" cx="38%" cy="32%" r="55%">
      <stop offset="0%" stop-color="rgba(220,240,255,0.45)"/>
      <stop offset="100%" stop-color="rgba(80,100,130,0.05)"/>
    </radialGradient>
    <filter id="ds"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="rgba(0,0,0,0.2)"/></filter>
  </defs>
  <ellipse cx="100" cy="215" rx="62" ry="5" fill="rgba(0,0,0,0.12)"/>
  <rect x="25" y="15" width="150" height="195" rx="12" fill="url(#dbody)" filter="url(#ds)"/>
  <rect x="25" y="15" width="150" height="40" rx="12" fill="#e0e6ec"/>
  <rect x="25" y="40" width="150" height="15" fill="#e0e6ec"/>
  <!-- Controls -->
  <circle cx="62" cy="33" r="12" fill="#c0c8d4" stroke="#a0a8b4" stroke-width="1.5"/>
  <circle cx="62" cy="33" r="7" fill="#d8e0e8"/>
  <circle cx="140" cy="33" r="10" fill="#F54E08" stroke="#d04000" stroke-width="1.5"/>
  <circle cx="140" cy="33" r="6" fill="#ff6a2a"/>
  <rect x="85" y="26" width="40" height="14" rx="3" fill="rgba(60,80,100,0.12)"/>
  <!-- Door ring -->
  <circle cx="100" cy="120" r="62" fill="rgba(0,0,0,0.06)"/>
  <circle cx="100" cy="120" r="59" fill="#7888a0"/>
  <circle cx="100" cy="120" r="54" fill="url(#ddrum)"/>
  <circle cx="100" cy="120" r="52" fill="url(#dsheen)"/>
  <!-- Fins inside drum -->
  <line x1="100" y1="68" x2="90" y2="170" stroke="rgba(255,255,255,0.15)" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="68" x2="110" y2="170" stroke="rgba(255,255,255,0.1)" stroke-width="3" stroke-linecap="round"/>
  <!-- Warm glow inside -->
  <circle cx="100" cy="120" r="30" fill="rgba(255,160,80,0.08)"/>
  <!-- Glass shine -->
  <ellipse cx="86" cy="106" rx="16" ry="10" fill="rgba(255,255,255,0.18)" transform="rotate(-15,86,106)"/>
  <!-- Handle -->
  <rect x="128" y="112" width="11" height="16" rx="5.5" fill="#b0b8c4"/>
  <!-- Vent grill bottom -->
  <rect x="60" y="188" width="80" height="12" rx="3" fill="rgba(0,0,0,0.1)"/>
  <line x1="68" y1="188" x2="68" y2="200" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
  <line x1="78" y1="188" x2="78" y2="200" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
  <line x1="88" y1="188" x2="88" y2="200" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
  <line x1="98" y1="188" x2="98" y2="200" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
  <line x1="108" y1="188" x2="108" y2="200" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
  <line x1="118" y1="188" x2="118" y2="200" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
  <line x1="128" y1="188" x2="128" y2="200" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
  <!-- Highlight -->
  <rect x="30" y="20" width="7" height="185" rx="3.5" fill="rgba(255,255,255,0.2)"/>
</svg>