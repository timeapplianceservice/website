  <text x="32" y="40" font-family="Georgia,serif"
        font-size="22" font-weight="700" fill="#003087"
        text-anchor="middle" letter-spacing="-1">GE</text>
  <!-- MONOGRAM text -->
  <text x="146" y="38" font-family="Arial,Helvetica,sans-serif"
